name: Package Extension

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Zip extension
        run: |
          zip -r youtube-useful-skin-${{ steps.version.outputs.VERSION }}.zip \
            manifest.json \
            content/ \
            popup/ \
            icons/*.png \
            --exclude "*.svg"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: youtube-useful-skin-${{ steps.version.outputs.VERSION }}.zip
